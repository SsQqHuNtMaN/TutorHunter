                    });
                }
                return;
            }

            if (window.TutorHunterCard) {
                window.TutorHunterCard.renderDetailPage(professor);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
