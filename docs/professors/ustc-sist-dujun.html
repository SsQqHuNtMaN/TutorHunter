            <button class="tab-btn" data-tab="sources" data-zh="数据来源" data-en="Sources"></button>
        </nav>

        <!-- Tab Contents -->
        <div class="tab-content active" id="tab-research"></div>
        <div class="tab-content" id="tab-publications"></div>
        <div class="tab-content" id="tab-students"></div>
        <div class="tab-content" id="tab-group"></div>
        <div class="tab-content" id="tab-admission"></div>
        <div class="tab-content" id="tab-sources"></div>
    </main>

    <!-- Footer -->

        <p>TutorHunter · <span data-zh="导师信息辅助研究生申请工具" data-en="Professor Database for Graduate School Applications"></span></p>

    <!-- JS Components -->
    <script src="../js/i18n.js"></script>
    <script src="../js/data-loader.js"></script>
    <script src="../js/professor-card.js"></script>
    <script>
    (function () {
        'use strict';

        function init() {
            var embeddedData = document.getElementById('embedded-data');
            var professor = null;

            if (embeddedData) {
                try {
                    professor = JSON.parse(embeddedData.textContent);
                } catch (e) {
                    console.warn('Failed to parse embedded data');
                }
            }

            // Fallback: load from JSON file based on page filename
            if (!professor || Object.keys(professor).length === 0) {
                var pathParts = window.location.pathname.split('/');
                var filename = pathParts[pathParts.length - 1];
                var profId = filename.replace('.html', '');

                if (window.TutorHunterData && profId) {
                    window.TutorHunterData.loadProfessor(profId).then(function (data) {
                        window.TutorHunterCard.renderDetailPage(data);
                    }).catch(function (err) {
                        console.error('Failed to load professor:', err);
                    });
                }
                return;
            }

            if (window.TutorHunterCard) {
                window.TutorHunterCard.renderDetailPage(professor);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
