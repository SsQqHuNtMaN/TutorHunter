<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ professor.display_name }} — TutorHunter</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-inner">
            <div>
                <span class="app-title">🎯 TutorHunter</span>
            </div>
            <div class="header-actions">
                <div class="lang-toggle">
                    <button class="lang-btn active" data-lang="zh">中文</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
        <!-- Back link -->
        <div class="detail-header-bar">
            <a href="../index.html" class="back-link">← <span data-zh="返回全部导师" data-en="Back to All Professors"></span></a>
        </div>

        <!-- Hero Section -->
        <div id="professor-hero" class="professor-hero">
            <!-- Rendered by professor-card.js -->
        </div>

        <!-- Tabs -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="research" data-zh="研究方向" data-en="Research"></button>
            <button class="tab-btn" data-tab="publications" data-zh="论文" data-en="Publications"></button>
            <button class="tab-btn" data-tab="students" data-zh="学生" data-en="Students"></button>
            <button class="tab-btn" data-tab="group" data-zh="课题组" data-en="Group"></button>
            <button class="tab-btn" data-tab="admission" data-zh="招生" data-en="Admission"></button>
            <button class="tab-btn" data-tab="sources" data-zh="数据来源" data-en="Sources"></button>
        </nav>

        <!-- Tab Contents -->
        <div class="tab-content active" id="tab-research"></div>
        <div class="tab-content" id="tab-publications"></div>
        <div class="tab-content" id="tab-students"></div>
        <div class="tab-content" id="tab-group"></div>
        <div class="tab-content" id="tab-admission"></div>
        <div class="tab-content" id="tab-sources"></div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <p>TutorHunter · <span data-zh="导师信息辅助研究生申请工具" data-en="Professor Database for Graduate School Applications"></span></p>
    </footer>

    <!-- Embedded professor data -->
    <script id="embedded-data" type="application/json">
    {{ professor | tojson | safe if professor else '{}' }}
    </script>

    <!-- JS Components -->
    <script src="../js/i18n.js"></script>
    <script src="../js/data-loader.js"></script>
    <script src="../js/professor-card.js"></script>
    <script>
    (function () {
        'use strict';

        function init() {
            var embeddedData = document.getElementById('embedded-data');
            var professor = null;

            if (embeddedData) {
                try {
                    professor = JSON.parse(embeddedData.textContent);
                } catch (e) {
                    console.warn('Failed to parse embedded data');
                }
            }

            // Fallback: load from JSON file based on page filename
            if (!professor || Object.keys(professor).length === 0) {
                var pathParts = window.location.pathname.split('/');
                var filename = pathParts[pathParts.length - 1];
                var profId = filename.replace('.html', '');

                if (window.TutorHunterData && profId) {
                    window.TutorHunterData.loadProfessor(profId).then(function (data) {
                        window.TutorHunterCard.renderDetailPage(data);
                    }).catch(function (err) {
                        console.error('Failed to load professor:', err);
                    });
                }
                return;
            }

            if (window.TutorHunterCard) {
                window.TutorHunterCard.renderDetailPage(professor);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
