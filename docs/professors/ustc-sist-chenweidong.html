    <script>
    (function () {
        'use strict';

        function init() {
            var embeddedData = document.getElementById('embedded-data');
            var professor = null;

            if (embeddedData) {
                try {
                    professor = JSON.parse(embeddedData.textContent);
                } catch (e) {
                    console.warn('Failed to parse embedded data');
                }
            }

            // Fallback: load from JSON file based on page filename
            if (!professor || Object.keys(professor).length === 0) {
                var pathParts = window.location.pathname.split('/');
                var filename = pathParts[pathParts.length - 1];
                var profId = filename.replace('.html', '');

                if (window.TutorHunterData && profId) {
                    window.TutorHunterData.loadProfessor(profId).then(function (data) {
                        window.TutorHunterCard.renderDetailPage(data);
                    }).catch(function (err) {
                        console.error('Failed to load professor:', err);
                    });
                }
                return;
            }

            if (window.TutorHunterCard) {
                window.TutorHunterCard.renderDetailPage(professor);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
